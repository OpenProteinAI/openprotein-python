[pytest]
# Pytest configuration for OpenProtein Python SDK

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    e2e: End-to-end tests that require API credentials
    slow: Slow-running tests
    integration: Integration tests

# Default options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Timeout for tests (in seconds)
timeout = 1200

# Parallel execution settings (when using pytest-xdist)
# Uncomment to enable by default:
# addopts = -n auto

# Test paths
testpaths = tests

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage (if pytest-cov is installed)
# addopts = --cov=openprotein --cov-report=html --cov-report=term
